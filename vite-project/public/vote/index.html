    <input id="input-poll-id" type="text" placeholder="Poll SHA256 id such as 51debf82..."/>
    
    
    <button id="button-verify">Verify</button>

<article id="panel-vote" hidden>
    <h1>Vote</h1>

    <h3><i>Private Key</i></h3>
    <p>Please</p>
    <input id="input-invitation" type="text" placeholder="Secret number such as '33'."/>

    <h3><i>Special invitation</i></h3>
    <p><i>If you have received special invitation code, please put it here</i></p>
    <input id="input-private_key" type="text" placeholder="Invitation number such as '18'."/>

    <h3>Option</h3>
    <p>Put the option as a number you wish to vote for.</p>
    <input id="input-vote" type="text" placeholder="Option number such as '0' (default)"/>
