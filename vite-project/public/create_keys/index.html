

<article>
    <h1>Create Keys</h1>

    <h3>Private Key</h3>
    <p>Keep it a secret and never share it anyone.</p>
    <input type="text" id="private_key" placeholder="Secret number such as '33'."/>
    <button class="button-copy-value" target="private_key">Copy</button>
    <button id="button-random-private_key">Random</button>
    
    <h3>Public Key</h3>
    <p>You can share this key with anyone.</p>
    <input type="text" id="public_key" disabled placeholder="Public number such as '69'."/>
    <button class="button-copy-value" target="public_key">Copy</button>


</article>
